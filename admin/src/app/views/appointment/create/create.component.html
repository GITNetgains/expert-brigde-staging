<c-container class="p-0">
  <c-row>
    <c-col>
      <c-card>
        <c-card-header>
          <h3>Create New 1on1 Session</h3>
        </c-card-header>
        <c-card-body>
          <c-row class="mb-3">
            <c-col md="6">
              <label cLabel><strong>Expert Name</strong></label>
              <ng-select
                cFormControl
                [items]="tutors"
                bindLabel="name"
                bindValue="_id"
                [(ngModel)]="selectedTutorId"
                (ngModelChange)="onTutorChange($event)"
                placeholder="Select Expert"
                class="my-select"
              ></ng-select>
            </c-col>
          </c-row>

          @if (calendarPayload.tutorId) {
          <c-row>
            <c-col md="12">
              <app-calendar [payload]="calendarPayload"></app-calendar>
            </c-col>
          </c-row>
          <c-row class="mt-3">
            <c-col md="12">
              <button cButton color="primary" (click)="save()">
                Save 1on1 Session
              </button>
            </c-col>
          </c-row>
          } @else {
          <p class="text-muted mb-0">
            Select an expert to create one-on-one session slots.
          </p>
          }
        </c-card-body>
      </c-card>
    </c-col>
  </c-row>
</c-container>
