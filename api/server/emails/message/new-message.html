<p>Hello {{user.name}},</p>
<p>You have an unread message from
  {% if sender.type === "tutor" and sender.showPublicIdOnly === true %}
    {{sender.userId}}
  {% else %}
    {{sender.name}}
  {% endif %}.
</p>
<p>Content: {{message.text}}</p>
<p>Please log in to view the message: <a href="{{appConfig.userWebUrl}}/users/conversations">{{appConfig.userWebUrl}}/users/conversations</a></p>
