<div class="mesgs">
  <div class="top-mesgs">
    <i class="fi fi-rs-angle-left" (click)="goBack()"></i>
    <img *ngIf="!isPrivacyApplied(receiver)" [src]="receiver?.avatarUrl"
      onerror="this.src='/assets/images/default-avatar.jpg'" alt="sunil" />
    <span *ngIf="isPrivacyApplied(receiver)" class="avatar avatar-placeholder" aria-hidden="true"><i
        class="fi fi-rr-user"></i></span>
    <h4 *ngIf="receiver">{{ isPrivacyApplied(receiver) ? (receiver?.userId || 'Expert') : receiver?.name }}</h4>
  </div>
  <div class="msg_history" #commentEl [scrollTop]="scrolltop">
    <div *ngIf="items.length < total" class="text-center mb-3">
      <a href="javascript:void(0)" translate (click)="loadMore()">
        Load more messages
      </a>
    </div>
    <p class="text-center" translate *ngIf="items.length>=total" translate>
      No more messages
    </p>
    <div *ngFor="let item of items" #item>
      <div class="incoming_msg" *ngIf="item.senderId !== currentUser._id">
        <div class="incoming_msg_img">
          <img *ngIf="!isPrivacyApplied(item.sender)" [src]="item.sender?.avatarUrl" onerror="this.src='/assets/images/default-avatar.jpg'" alt="sunil" />
          <span *ngIf="isPrivacyApplied(item.sender)" class="avatar avatar-placeholder" aria-hidden="true"><i
              class="fi fi-rr-user"></i></span>
        </div>
        <div class="received_msg">
          <div class="received_withd_msg">
            <p>{{item.text}}</p>
            <span class="time_date"> {{item.createdAt | date:'short'}}</span>
          </div>
        </div>
      </div>
      <div class="outgoing_msg" *ngIf="item.senderId === currentUser._id">
        <div class="sent_msg">
          <p>{{item.text}}</p>
          <span class="time_date"> {{item.createdAt | date:'short'}}</span>
        </div>
      </div>
    </div>
  </div>
  <div class="type_msg">
    <div class="input_msg_write">
      <input type="text" class="write_msg" placeholder="{{'Type a message' | translate}}" [(ngModel)]="newText"
        name="newmessage" (keypress)="enterToSend($event)" />
      <button class="msg_send_btn" type="button" (click)="send()">
        <i class="fi fi-rs-paper-plane"></i>
      </button>
    </div>
  </div>
</div>
